dados_toggle:
  variables:
    entity: null                      # Target entity for favorite label toggle
    favorite_label: fav               # Label id/name that marks an entity as favorite

  # Heart icon indicates if the entity currently has the favorite label
  icon: mdi:heart

  # This is a pure toggle button (no name/state text)
  show_name: false
  show_state: false

  entity: '[[[ return variables.entity ]]]'

  # Tap toggles the favorite label on the entity
  tap_action:
    action: call-service
    service: |
      [[[
        const id = variables?.entity;
        const label = variables?.favorite_label || 'fav';
        const labels = hass?.entities?.[id]?.labels || [];
        return labels.includes(label)
          ? 'homeassistant.remove_label_from_entity'
          : 'homeassistant.add_label_to_entity';
      ]]]
    data:
      entity_id: '[[[ return variables.entity ]]]'
      label_id: '[[[ return variables?.favorite_label || "fav" ]]]'

  styles:
    # Outer button container (transparent, just holds the tile)
    card:
      - height: 50px
      - width: 50px
      - border-radius: 5px
      - background: transparent

    # Inner tile behind the icon
    img_cell:
      - height: 47px
      - width: 47px
      - border-radius: 15px
      - background: var(--contrast3)        # neutral background (icon color indicates ON)

    # Icon sizing
    icon:
      - height: 30px
      - width: 30px
      - color: |
          [[[
            const id = variables?.entity;
            const label = variables?.favorite_label || 'fav';
            const labels = hass?.entities?.[id]?.labels || [];
            return labels.includes(label) ? 'rgb(255, 145, 138)' : '#898C94';
          ]]]

  extra_styles: |
    /* Disable ripple for a clean chip look */
    ha-ripple { display: none !important; }
